<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pastel Geometry – Claude Code</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{height:100%;scroll-snap-type:y mandatory;overflow-y:scroll;scroll-behavior:smooth}
  body{min-height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:#c8d9e6}

  /* ---------- Slides container ---------- */
  .deck{display:flex;flex-direction:column}

  section.slide{
    position:relative;width:100%;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:clamp(1rem,4vw,3rem);
    scroll-snap-align:start;scroll-snap-stop:always;
  }

  .card{
    position:relative;width:100%;max-width:960px;aspect-ratio:16/9;
    background:#faf9f7;border-radius:clamp(12px,2vw,24px);
    box-shadow:0 8px 32px rgba(0,0,0,.08);
    display:flex;flex-direction:column;justify-content:center;
    padding:clamp(2rem,5vw,5rem);overflow:hidden;
  }

  /* ---------- Typography ---------- */
  .title{
    font-weight:800;font-size:clamp(2rem,5vw,4rem);color:#2a2a2a;
    line-height:1.15;letter-spacing:-.02em;margin-bottom:.35em;
  }
  .subtitle{
    font-weight:500;font-size:clamp(.95rem,2vw,1.6rem);color:#5a6a72;line-height:1.5;
  }
  .section-title{
    font-weight:700;font-size:clamp(1.5rem,3.5vw,2.8rem);color:#2a2a2a;
    line-height:1.2;letter-spacing:-.015em;margin-bottom:clamp(.8rem,2vw,1.6rem);
  }

  /* ---------- Feature grid (slide 2) ---------- */
  .features{
    display:grid;grid-template-columns:1fr 1fr;
    gap:clamp(.6rem,1.5vw,1.4rem);max-width:680px;
  }
  .feature{
    display:flex;align-items:flex-start;gap:clamp(.4rem,1vw,.8rem);
  }
  .feature-icon{
    flex-shrink:0;width:clamp(28px,3.5vw,44px);height:clamp(28px,3.5vw,44px);
    border-radius:clamp(6px,1vw,12px);display:flex;align-items:center;justify-content:center;
    font-size:clamp(.8rem,1.5vw,1.2rem);color:#fff;font-weight:700;
  }
  .feature-icon--pink{background:#f0b4d4}
  .feature-icon--mint{background:#a8d4c4}
  .feature-icon--sage{background:#5a7c6a}
  .feature-icon--lavender{background:#9b8dc4}
  .feature-label{
    font-weight:700;font-size:clamp(.75rem,1.4vw,1.1rem);color:#2a2a2a;
    line-height:1.3;margin-bottom:.15em;
  }
  .feature-desc{
    font-weight:400;font-size:clamp(.6rem,1.1vw,.88rem);color:#5a6a72;line-height:1.45;
  }

  /* ---------- Code block (slide 3) ---------- */
  .cta-text{
    font-weight:500;font-size:clamp(.85rem,1.6vw,1.25rem);color:#5a6a72;
    line-height:1.5;margin-bottom:clamp(.8rem,2vw,1.4rem);
  }
  .code-block{
    display:inline-block;background:#2a2a2a;color:#a8d4c4;
    font-family:'SF Mono',Consolas,'Liberation Mono',Menlo,monospace;
    font-size:clamp(.75rem,1.5vw,1.15rem);
    padding:clamp(.5rem,1.2vw,1rem) clamp(.8rem,2vw,1.6rem);
    border-radius:clamp(6px,1vw,12px);letter-spacing:.02em;
    font-weight:500;
  }

  /* ---------- Vertical pills on right edge ---------- */
  .pills{
    position:absolute;right:0;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;align-items:flex-end;gap:clamp(6px,1vw,10px);
  }
  .pill{
    width:clamp(18px,2.5vw,28px);border-radius:999px;
    transform:translateX(35%);
  }
  .pill--1{height:clamp(32px,5vw,56px);background:#f0b4d4}
  .pill--2{height:clamp(52px,8vw,96px);background:#a8d4c4}
  .pill--3{height:clamp(72px,11vw,132px);background:#9b8dc4}
  .pill--4{height:clamp(52px,8vw,96px);background:#5a7c6a}
  .pill--5{height:clamp(32px,5vw,56px);background:#7c6aad}

  /* ---------- Progress bar ---------- */
  .progress{
    position:fixed;top:0;left:0;height:4px;background:#9b8dc4;
    width:0;z-index:100;transition:width .35s ease;
  }

  /* ---------- Nav dots ---------- */
  .nav-dots{
    position:fixed;right:clamp(12px,2vw,24px);top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:12px;z-index:100;
  }
  .nav-dot{
    width:10px;height:10px;border-radius:50%;border:2px solid #9b8dc4;
    background:transparent;cursor:pointer;transition:background .3s ease,transform .3s ease;
    padding:0;
  }
  .nav-dot.active{background:#9b8dc4;transform:scale(1.25)}
  .nav-dot:hover{background:#7c6aad}

  /* ---------- Reveal animation ---------- */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
  .reveal.visible{opacity:1;transform:translateY(0)}

  /* ---------- Reduced motion ---------- */
  @media(prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .reveal{opacity:1;transform:none;transition:none}
    .progress{transition:none}
    .nav-dot{transition:none}
    .card,.pill{transition:none!important;animation:none!important}
  }

  /* ---------- Small screen: stack feature grid ---------- */
  @media(max-width:600px){
    .features{grid-template-columns:1fr}
    .card{aspect-ratio:auto;min-height:60vh}
  }
</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress" id="progress" aria-hidden="true"></div>

<!-- Nav dots -->
<nav class="nav-dots" id="navDots" aria-label="Slide navigation">
  <button class="nav-dot active" data-slide="0" aria-label="Slide 1"></button>
  <button class="nav-dot" data-slide="1" aria-label="Slide 2"></button>
  <button class="nav-dot" data-slide="2" aria-label="Slide 3"></button>
</nav>

<div class="deck">

  <!-- Slide 1: Title -->
  <section class="slide" id="slide-0">
    <div class="card">
      <h1 class="title reveal">Claude Code</h1>
      <p class="subtitle reveal">AI 驱动的编程助手</p>
      <div class="pills" aria-hidden="true">
        <span class="pill pill--1"></span>
        <span class="pill pill--2"></span>
        <span class="pill pill--3"></span>
        <span class="pill pill--4"></span>
        <span class="pill pill--5"></span>
      </div>
    </div>
  </section>

  <!-- Slide 2: Core capabilities -->
  <section class="slide" id="slide-1">
    <div class="card">
      <h2 class="section-title reveal">核心能力</h2>
      <div class="features">
        <div class="feature reveal">
          <div class="feature-icon feature-icon--pink">E</div>
          <div>
            <div class="feature-label">智能编辑</div>
            <div class="feature-desc">跨文件代码编辑与重构，理解项目上下文</div>
          </div>
        </div>
        <div class="feature reveal">
          <div class="feature-icon feature-icon--mint">D</div>
          <div>
            <div class="feature-label">调试修复</div>
            <div class="feature-desc">自动定位问题根因，生成修复方案</div>
          </div>
        </div>
        <div class="feature reveal">
          <div class="feature-icon feature-icon--sage">T</div>
          <div>
            <div class="feature-label">测试生成</div>
            <div class="feature-desc">自动编写单元测试与集成测试用例</div>
          </div>
        </div>
        <div class="feature reveal">
          <div class="feature-icon feature-icon--lavender">G</div>
          <div>
            <div class="feature-label">Git 工作流</div>
            <div class="feature-desc">提交、合并、解决冲突，全流程支持</div>
          </div>
        </div>
      </div>
      <div class="pills" aria-hidden="true">
        <span class="pill pill--1"></span>
        <span class="pill pill--2"></span>
        <span class="pill pill--3"></span>
        <span class="pill pill--4"></span>
        <span class="pill pill--5"></span>
      </div>
    </div>
  </section>

  <!-- Slide 3: Getting started -->
  <section class="slide" id="slide-2">
    <div class="card">
      <h2 class="section-title reveal">开始使用</h2>
      <p class="cta-text reveal">在终端中运行以下命令，即刻开启 AI 编程体验：</p>
      <div class="reveal">
        <code class="code-block">npm install -g @anthropic-ai/claude-code</code>
      </div>
      <div class="pills" aria-hidden="true">
        <span class="pill pill--1"></span>
        <span class="pill pill--2"></span>
        <span class="pill pill--3"></span>
        <span class="pill pill--4"></span>
        <span class="pill pill--5"></span>
      </div>
    </div>
  </section>

</div>

<script>
(function(){
  'use strict';

  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.nav-dot');
  const progress = document.getElementById('progress');
  const total = slides.length;
  let current = 0;
  let isScrolling = false;

  /* ---------- IntersectionObserver: reveal elements ---------- */
  const revealObs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting) e.target.classList.add('visible');
    });
  },{threshold:0.15});
  document.querySelectorAll('.reveal').forEach(function(el){revealObs.observe(el)});

  /* ---------- IntersectionObserver: track active slide ---------- */
  const slideObs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var idx = Array.prototype.indexOf.call(slides, e.target);
        if(idx !== -1) setActive(idx);
      }
    });
  },{threshold:0.55});
  slides.forEach(function(s){slideObs.observe(s)});

  function setActive(idx){
    current = idx;
    dots.forEach(function(d,i){d.classList.toggle('active', i === idx)});
    progress.style.width = ((idx + 1) / total * 100) + '%';
  }

  function goTo(idx){
    if(idx < 0 || idx >= total) return;
    slides[idx].scrollIntoView({behavior:'smooth'});
  }

  /* ---------- Nav dot clicks ---------- */
  dots.forEach(function(d){
    d.addEventListener('click', function(){
      goTo(parseInt(this.dataset.slide, 10));
    });
  });

  /* ---------- Keyboard navigation ---------- */
  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' '){
      e.preventDefault(); goTo(current + 1);
    } else if(e.key === 'ArrowUp' || e.key === 'PageUp'){
      e.preventDefault(); goTo(current - 1);
    } else if(e.key === 'Home'){
      e.preventDefault(); goTo(0);
    } else if(e.key === 'End'){
      e.preventDefault(); goTo(total - 1);
    }
  });

  /* ---------- Wheel navigation (debounced) ---------- */
  document.addEventListener('wheel', function(e){
    if(isScrolling) return;
    if(Math.abs(e.deltaY) < 30) return;
    isScrolling = true;
    if(e.deltaY > 0) goTo(current + 1);
    else goTo(current - 1);
    setTimeout(function(){isScrolling = false}, 800);
  },{passive:true});

  /* ---------- Touch navigation ---------- */
  var touchStartY = 0;
  document.addEventListener('touchstart', function(e){
    touchStartY = e.changedTouches[0].screenY;
  },{passive:true});
  document.addEventListener('touchend', function(e){
    var dy = touchStartY - e.changedTouches[0].screenY;
    if(Math.abs(dy) < 50) return;
    if(dy > 0) goTo(current + 1);
    else goTo(current - 1);
  },{passive:true});

  /* ---------- Initial state ---------- */
  setActive(0);
})();
</script>
</body>
</html>
