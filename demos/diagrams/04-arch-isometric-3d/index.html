<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会呼吸的架构图 — 等轴测 3D 架构 · Isometric Architecture</title>

<!--
  ============================================================================
  会呼吸的架构图 — Native CSS 3D Isometric Architecture Diagram
  ============================================================================
  ONE self-contained file. Fully OFFLINE: no web fonts, no CDN, no http(s),
  no ESM/build. Double-click to open via file://. Console stays clean.

  What this is: a living 2.5D architecture diagram that replaces flat drawio
  PNGs. Six service tiles stand as true isometric blocks on a gridded plane;
  glowing routed paths connect them; request packets (purple) flow Client→…→DB
  with tiles pulsing on arrival, then response packets (pink) ripple back.
  Move the mouse to gently tilt the whole scene.

  ---------------------------------------------------------------------------
  CSS 3D CRASH COURSE (this file doubles as a copy-paste skill reference)
  ---------------------------------------------------------------------------
  * perspective lives on the CONTAINER (.scene), never on the transformed
    plane. It sets the viewer's eye distance to z=0. ~1400px = a believable,
    not-too-dramatic isometric read.

  * transform-style: preserve-3d goes on the element whose CHILDREN must live
    in real 3D space (.iso-stage and each .tile). Without it, children are
    flattened onto the parent's plane.

  * THE FLATTENING GOTCHA (critical, learned the hard way): an element with
    transform-style: preserve-3d is SILENTLY forced back to flat if it ALSO
    carries ANY of:  opacity < 1, filter, backdrop-filter, clip-path, mask,
    mix-blend-mode, isolation, or overflow != visible.
    => Every preserve-3d element below (.iso-stage, .tile) carries NONE of
       those. All glow / blur / opacity / rounded-clipping live on CHILD
       layers. Each such parent is marked "// KEEP CLEAN".

  * ISOMETRIC POSE: the plane is rotateX(55deg) rotateZ(-45deg). That tips a
    flat square away from the camera and spins it 45° so its axes read as the
    classic 2:1 isometric grid. Tiles laid flat IN this plane inherit the pose
    and read as 3D blocks; their extruded "sides" are drawn with darker
    pseudo-elements pushed down in Z.

  * LABELS must stay readable, so they are COUNTER-ROTATED to face the camera:
    rotateZ(45deg) rotateX(-55deg) exactly undoes the plane pose (billboarding).
    backface-visibility:hidden + effective font-size >=14px keeps text crisp
    under the 3D transform (avoids sub-pixel shimmer).

  * SVG connection paths live in their OWN child layer of .iso-stage, so they
    inherit the isometric pose and lie IN the plane. The SVG wrapper — not the
    preserve-3d stage — is where overflow:visible is allowed to sit.

  * PACKETS use SMIL <animateMotion> + <mpath> referencing the same <path>
    geometry, so dots ride exactly along the drawn routes. A choreographed
    ~7s loop: request wave then response wave, with begin offsets.

  * POINTER TILT: mouse move nudges .scene's rotateX/rotateZ a few degrees
    around the base pose, eased in one rAF loop (current += (t-current)*EASE).
    Paused on visibilitychange. Touch is ignored.

  * prefers-reduced-motion: reduce -> static isometric scene: no packets, no
    tilt, no entrance, no marching ants. Everything rests in a clean pose.
  ============================================================================
-->

<style>
  /* ================================================================ *
   *  "re:Invent Keynote" palette + tokens                            *
   * ================================================================ */
  :root {
    --bg:      #0A0A0A;   /* base near-black                          */
    --purple:  #8B5CF6;   /* request / primary neon purple            */
    --pink:    #D946EF;   /* response / neon magenta                  */
    --blue:    #38BDF8;   /* accent blue                              */
    --green:   #34D399;   /* accent green (cache / healthy)           */
    --ink:     #FFFFFF;   /* white text                               */
    --muted:   rgba(255,255,255,0.60);  /* 60% white                  */

    /* One knob scales the whole isometric stage responsively.        *
     * Media queries below shrink it; nothing else needs to change.   */
    --stage-scale: 0.82;   /* leave headroom: the projected plane + billboarded
                              labels must fit between header and viewport bottom */

    /* isometric plane pose (kept in vars so JS tilt can compose it)  */
    --pose-rx: 55deg;
    --pose-rz: -45deg;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    /* Requested offline font stack (all system/fallback — no @font-face). */
    font-family: 'Urbanist', 'Albert Sans', 'Avenir Next', 'PingFang SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;               /* fit 100vh, never scroll         */
  }

  /* Full-viewport frame: header on top, stage in the middle, captions   *
   * pinned to the bottom corners.                                       */
  .wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    isolation: isolate;             /* contain z-index (NOT a 3D parent) */
  }

  /* ================================================================ *
   *  Ambient blurred orbs behind the scene. These freely use         *
   *  filter/opacity because they are NOT preserve-3d parents.        *
   * ================================================================ */
  .orbs { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb  { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
  .orb.p {
    width: 620px; height: 620px; top: -140px; left: -120px; opacity: 0.55;
    background: radial-gradient(circle, var(--purple), transparent 70%);
    animation: drift1 20s ease-in-out infinite alternate;
  }
  .orb.k {
    width: 560px; height: 560px; bottom: -180px; right: -120px; opacity: 0.5;
    background: radial-gradient(circle, var(--pink), transparent 70%);
    animation: drift2 24s ease-in-out infinite alternate;
  }
  .orb.b {
    width: 420px; height: 420px; top: 46%; left: 58%; opacity: 0.28;
    background: radial-gradient(circle, var(--blue), transparent 70%);
    animation: drift3 28s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0) scale(1);    }
                      to   { transform: translate(70px,54px) scale(1.14);} }
  @keyframes drift2 { from { transform: translate(0,0) scale(1);    }
                      to   { transform: translate(-64px,-46px) scale(1.18);} }
  @keyframes drift3 { from { transform: translate(0,0) scale(0.92); }
                      to   { transform: translate(-52px,38px) scale(1.06);} }

  /* ================================================================ *
   *  Header — eyebrow + h1 + sub                                     *
   * ================================================================ */
  header {
    position: relative; z-index: 4;
    text-align: center;
    padding: clamp(18px, 3.4vh, 34px) 20px 0;
    flex: 0 0 auto;
  }
  .eyebrow {
    display: inline-block;
    font-size: clamp(10px, 1.1vw, 12px);
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--blue);
    border: 1px solid rgba(56,189,248,0.4);
    padding: 6px 14px; border-radius: 999px;
    margin-bottom: clamp(10px, 1.8vh, 16px);
  }
  header h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 56px);
    line-height: 1.04; font-weight: 800; letter-spacing: 0.5px;
    background: linear-gradient(100deg, var(--purple) 0%, var(--pink) 50%, var(--blue) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 18px rgba(217,70,239,0.45))
            drop-shadow(0 0 36px rgba(139,92,246,0.30));
  }
  header .sub {
    margin: clamp(8px, 1.6vh, 14px) auto 0; max-width: 60ch;
    color: var(--muted); font-size: clamp(12px, 1.5vw, 16px); letter-spacing: 0.5px;
  }

  /* ================================================================ *
   *  SCENE — perspective container (perspective lives HERE).         *
   *  JS writes --tilt-rx / --tilt-rz here for pointer tilt.          *
   * ================================================================ */
  .scene {
    position: relative; z-index: 2;
    flex: 1 1 auto;
    width: 100%;
    perspective: 1400px;
    perspective-origin: 50% 46%;
    display: flex; align-items: center; justify-content: center;
    /* tilt is applied to a wrapper (.tilt) — see below.               */
  }

  /* A plain (NOT preserve-3d) tilt wrapper carries the pointer nudge.  *
   * Keeping tilt OFF .iso-stage means we never risk mutating the      *
   * preserve-3d node with something that could flatten it, and the    *
   * base isometric pose stays declarative on .iso-stage.              */
  .tilt {
    transform: rotateX(var(--tilt-rx, 0deg)) rotateZ(var(--tilt-rz, 0deg));
    transform-style: preserve-3d;   /* relay 3D down to .iso-stage      */
    will-change: transform;
    /* the projected plane leans toward the viewer (rotateX), so its visual
     * mass sits LOW — nudge the whole stage up so the near tile row isn't
     * clipped by the viewport bottom. margin is safe on a preserve-3d node
     * (only paint-affecting properties trigger the flattening gotcha). */
    margin-top: -22vh;
  }

  /* // KEEP CLEAN: the isometric plane. preserve-3d + the iso pose,   *
   * scaled by --stage-scale. NO opacity/filter/overflow/clip/mask     *
   * /blend here — all effects live on child layers.                   */
  .iso-stage {
    position: relative;
    width: 900px; height: 900px;
    transform-style: preserve-3d;
    transform:
      scale(var(--stage-scale))
      rotateX(var(--pose-rx))
      rotateZ(var(--pose-rz));
    will-change: transform;
  }

  /* The gridded floor — a CHILD of the stage, so it may freely use     *
   * gradients + a radial vignette mask. It lies flat in the plane.     */
  .floor {
    position: absolute; inset: 0;
    border-radius: 24px;
    background:
      /* soft radial vignette so the plane fades at its edges */
      radial-gradient(ellipse at 50% 50%,
        rgba(139,92,246,0.14) 0%,
        rgba(139,92,246,0.05) 42%,
        rgba(10,10,10,0.0) 74%),
      /* subtle isometric grid (two directions of thin lines) */
      repeating-linear-gradient(0deg,
        rgba(139,92,246,0.16) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(90deg,
        rgba(56,189,248,0.12) 0 1px, transparent 1px 60px),
      linear-gradient(160deg, rgba(139,92,246,0.06), rgba(10,10,10,0.0) 70%);
    box-shadow:
      inset 0 0 90px rgba(139,92,246,0.20),
      inset 0 0 30px rgba(217,70,239,0.12);
    /* fade the whole grid out toward the rim so it doesn't hard-edge   */
    -webkit-mask-image: radial-gradient(ellipse at 50% 50%, #000 52%, transparent 82%);
            mask-image: radial-gradient(ellipse at 50% 50%, #000 52%, transparent 82%);
    opacity: 0;                     /* entrance: grid fades in first     */
    animation: floorIn 0.9s ease-out 0.05s forwards;
  }
  @keyframes floorIn { to { opacity: 1; } }

  /* A faint bright edge frame around the plane (separate child so the  *
   * mask on .floor doesn't eat it).                                    */
  .floor-frame {
    position: absolute; inset: 0;
    border: 1px solid rgba(139,92,246,0.30);
    border-radius: 24px;
    box-shadow: 0 0 40px rgba(139,92,246,0.18);
    pointer-events: none;
  }

  /* ================================================================ *
   *  SVG CONNECTION LAYER — its own child of .iso-stage, so it        *
   *  inherits the isometric pose and lies IN the plane. overflow      *
   *  visible sits on THIS wrapper, never on the preserve-3d stage.    *
   * ================================================================ */
  .paths {
    position: absolute; inset: 0;
    overflow: visible;              /* safe: .paths is NOT the 3D root   */
    pointer-events: none;
  }
  .paths svg { position: absolute; inset: 0; overflow: visible; }

  /* base (dim) routes: always visible so the topology reads even at rest */
  .route {
    fill: none;
    stroke: rgba(139,92,246,0.28);
    stroke-width: 3;
    stroke-linecap: round; stroke-linejoin: round;
  }
  /* the glowing "active" overlay drawn on top of each request route;    *
   * a dash pattern + moving dashoffset = marching-ants shimmer.         */
  .route-live {
    fill: none;
    stroke: var(--purple);
    stroke-width: 3;
    stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 6px rgba(139,92,246,0.9));
    stroke-dasharray: 14 12;
    animation: ants 1.1s linear infinite;
  }
  /* response overlay: pink, dashed, marching the other way             */
  .route-resp {
    fill: none;
    stroke: var(--pink);
    stroke-width: 2.4;
    stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 6px rgba(217,70,239,0.85));
    stroke-dasharray: 6 14;
    animation: antsBack 1.3s linear infinite;
  }
  @keyframes ants     { to { stroke-dashoffset: -26; } }
  @keyframes antsBack { to { stroke-dashoffset:  20; } }

  /* the flowing packet dots */
  .packet-req  { fill: var(--purple); filter: drop-shadow(0 0 7px var(--purple)); }
  .packet-resp { fill: var(--pink);   filter: drop-shadow(0 0 7px var(--pink));   }
  .packet-core { fill: #fff; }

  /* ================================================================ *
   *  SERVICE TILES — each is a preserve-3d group laid flat in the     *
   *  plane. A tile = pad (on floor) + block top (lifted in Z) with    *
   *  two darker extruded side faces + a ground shadow + billboarded   *
   *  label. Heights vary via --h (translateZ of the block top).       *
   * ================================================================ */

  /* positioning wrapper: places the tile on the grid via left/top and  *
   * gives each tile its own preserve-3d space + entrance animation.    *
   * // KEEP CLEAN: no filter/opacity/overflow on .tile itself.         */
  .tile {
    position: absolute;
    width: 150px; height: 150px;
    margin-left: -75px; margin-top: -75px;   /* center on its grid point */
    transform-style: preserve-3d;
    /* ENTRANCE — rise from the floor. FLATTENING-GOTCHA FIX: the rise is
     * TRANSFORM-ONLY here. Animating opacity on this preserve-3d node would
     * silently flatten the tile's 3D block/sides for the whole 0.7s (they'd
     * "pop" into 3D at the end). So the opacity FADE lives on the CHILD leaf
     * layers instead (see .layerFade rule below). Stagger via inline delay. */
    animation: tileRise 0.7s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes tileRise {
    from { transform: translateZ(-90px); }   /* transform only -> stays 3D */
    to   { transform: translateZ(0); }
  }
  /* Opacity fade on the LEAF layers (none are preserve-3d roots, so opacity
   * is safe here). animation-delay:inherit picks up each tile's staggered
   * inline delay so fade + rise stay in sync per tile.                      */
  .tile .shadow, .tile .pad, .tile .side, .tile .face, .tile .block {
    animation: layerFade 0.7s ease-out both;
    animation-delay: inherit;
  }
  @keyframes layerFade { from { opacity: 0; } to { opacity: 1; } }

  /* GROUND SHADOW: a blurred dark ellipse on the floor under the block. *
   * Child layer -> filter/opacity fine. Sits at plane level (z=0).      */
  .tile .shadow {
    position: absolute; left: 50%; top: 50%;
    width: 120px; height: 120px;
    margin-left: -60px; margin-top: -60px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), transparent 70%);
    filter: blur(10px);
    border-radius: 20px;
  }

  /* PAD: a glowing rounded rect lying flat on the floor (the footprint) */
  .tile .pad {
    position: absolute; inset: 15px;
    border-radius: 16px;
    border: 1px solid rgba(139,92,246,0.5);
    background: linear-gradient(135deg, rgba(139,92,246,0.14), rgba(217,70,239,0.08));
    box-shadow: inset 0 0 24px rgba(139,92,246,0.30), 0 0 18px rgba(139,92,246,0.25);
  }

  /* BLOCK: the lifted top face of the isometric cube. Raised by --h.    *
   * This is the surface the icon + label sit on. It's a CHILD of the    *
   * preserve-3d tile, so its glow/opacity are safe.                     */
  .tile .block {
    position: absolute; inset: 18px;
    border-radius: 15px;
    transform: translateZ(var(--h, 42px));
    background:
      linear-gradient(135deg, rgba(30,20,54,0.96), rgba(18,12,34,0.96));
    border: 1px solid rgba(217,70,239,0.55);
    box-shadow:
      inset 0 0 26px rgba(139,92,246,0.35),
      0 0 26px rgba(139,92,246,0.45);
    backface-visibility: hidden;
  }
  /* neon accent hue per tile via --edge (set inline). */
  .tile .block { border-color: var(--edge, rgba(217,70,239,0.55)); }

  /* EXTRUSION SIDES: two skewed darker faces bridging pad->block so the *
   * tile reads as a solid raised cube. We fake them with two absolutely *
   * positioned quads rotated to stand vertically along two edges. They  *
   * are children (safe to darken). Height matches --h.                  */
  .tile .side {
    position: absolute;
    background: linear-gradient(var(--sideDir, 180deg),
      rgba(10,8,20,0.96), rgba(6,5,14,0.98));
    border: 1px solid rgba(139,92,246,0.22);
    backface-visibility: hidden;
  }
  /* south face: runs along the bottom edge, stands up in Z */
  .tile .side.s {
    left: 18px; right: 18px; bottom: 18px;
    height: var(--h, 42px);
    transform-origin: bottom center;
    transform: rotateX(-90deg);
    border-radius: 0 0 3px 3px;
  }
  /* east face: runs along the right edge, stands up in Z */
  .tile .side.e {
    top: 18px; bottom: 18px; right: 18px;
    width: var(--h, 42px);
    transform-origin: center right;
    transform: rotateY(90deg);
    border-radius: 0 0 3px 3px;
  }

  /* LABEL + ICON: billboarded to face the camera. Counter-rotating the  *
   * plane pose (rotateZ +45, rotateX -55) makes text upright & readable.*
   * Lifted to the block top (+ a hair) and centered.                    */
  .tile .face {
    position: absolute; left: 50%; top: 50%;
    width: 150px;
    transform:
      translate(-50%, -50%)
      /* +34px, not +1px: the billboard is TILTED up out of the plane, so its
       * lower half swings BELOW the anchor height — anchored at the block top
       * the bottom of the label would sink INTO the block and get z-occluded.
       * Floating the anchor well above the top face keeps all text in front. */
      translateZ(calc(var(--h, 42px) + 34px))
      rotateZ(45deg) rotateX(-55deg);   /* undo the plane pose (billboard) */
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    text-align: center;
    backface-visibility: hidden;        /* crisper text under 3D           */
    pointer-events: none;
  }
  .tile .ico {
    width: 34px; height: 34px; line-height: 0;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 8px var(--edge, var(--pink)));
  }
  .tile .ico svg {
    width: 30px; height: 30px; stroke: #fff; fill: none;
    stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
  }
  .tile .name {
    font-size: 15px; font-weight: 700; color: var(--ink);
    letter-spacing: 0.4px; text-shadow: 0 0 10px rgba(0,0,0,0.9);
    white-space: nowrap;
  }
  .tile .role {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
  }

  /* ARRIVAL PULSE: when a packet reaches a tile, JS adds .pulse which   *
   * flares the block glow briefly. Runs on the block (child) — safe.    */
  .tile.pulse .block {
    animation: tilePulse 0.55s ease-out;
  }
  @keyframes tilePulse {
    0%   { box-shadow: inset 0 0 26px rgba(139,92,246,0.35), 0 0 26px rgba(139,92,246,0.45); }
    40%  { box-shadow: inset 0 0 40px rgba(217,70,239,0.85), 0 0 60px rgba(217,70,239,0.95); }
    100% { box-shadow: inset 0 0 26px rgba(139,92,246,0.35), 0 0 26px rgba(139,92,246,0.45); }
  }

  /* ================================================================ *
   *  Bottom captions + replay button                                *
   * ================================================================ */
  .cap {
    position: absolute; bottom: clamp(14px, 3vh, 26px); left: clamp(16px, 3vw, 30px);
    z-index: 5;
    font-size: clamp(11px, 1.3vw, 14px); color: var(--muted); letter-spacing: 0.4px;
    max-width: 60ch;
  }
  .cap .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; vertical-align: middle; margin: 0 4px 2px 0; }
  .cap .dot.req  { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
  .cap .dot.resp { background: var(--pink);   box-shadow: 0 0 8px var(--pink);   }

  .replay {
    position: absolute; bottom: clamp(14px, 3vh, 26px); right: clamp(16px, 3vw, 30px);
    z-index: 5;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 999px;
    font-family: inherit; font-size: 13px; letter-spacing: 1px; color: var(--ink);
    background: rgba(139,92,246,0.14);
    border: 1px solid rgba(139,92,246,0.5);
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
  }
  .replay:hover { background: rgba(217,70,239,0.20); border-color: rgba(217,70,239,0.7); }
  .replay:active { transform: translateY(1px); }
  .replay svg { width: 15px; height: 15px; stroke: var(--ink); fill: none;
                stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ================================================================ *
   *  RESPONSIVE — scale the whole stage via --stage-scale so it       *
   *  never overflows narrow / short viewports.                        *
   * ================================================================ */
  @media (max-width: 1200px) { :root { --stage-scale: 0.86; } }
  @media (max-width: 1000px) { :root { --stage-scale: 0.72; } }
  @media (max-width: 820px)  { :root { --stage-scale: 0.60; } }
  @media (max-width: 640px)  { :root { --stage-scale: 0.48; } }
  @media (max-height: 780px) { :root { --stage-scale: 0.78; } }
  @media (max-height: 640px) { :root { --stage-scale: 0.62; } .cap { max-width: 40ch; } }

  /* ================================================================ *
   *  GRACEFUL DEGRADATION — no preserve-3d support: collapse to a     *
   *  readable flat top-down view (tiles still show icon + label).     *
   * ================================================================ */
  @supports not (transform-style: preserve-3d) {
    .iso-stage, .tilt { transform: none !important; }
    .tile .block, .tile .face, .tile .side { transform: none !important; }
    .tile .side { display: none; }
    .tile .face { position: relative; left: auto; top: auto; }
  }

  /* ================================================================ *
   *  REDUCED MOTION — static isometric scene. No packets, no ants,   *
   *  no tilt, no entrance. Everything rests in its final pose.       *
   * ================================================================ */
  @media (prefers-reduced-motion: reduce) {
    .orb          { animation: none !important; }
    .floor        { animation: none !important; opacity: 1 !important; }
    .tile         { animation: none !important; opacity: 1 !important; }
    .tile .shadow, .tile .pad, .tile .side,
    .tile .face, .tile .block { animation: none !important; opacity: 1 !important; }
    .route-live   { animation: none !important; stroke-dasharray: none; }
    .route-resp   { animation: none !important; stroke-dasharray: none; opacity: 0.5; }
    .packet-req, .packet-resp, .packet-core { display: none !important; }
    .tile.pulse .block { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- ambient blurred orbs (behind everything; NOT 3D parents -> filters ok) -->
    <div class="orbs">
      <div class="orb p"></div>
      <div class="orb k"></div>
      <div class="orb b"></div>
    </div>

    <!-- ---------------------------- Header ---------------------------- -->
    <header>
      <span class="eyebrow">NATIVE CSS 3D — ISOMETRIC ARCHITECTURE</span>
      <h1>会呼吸的架构图</h1>
      <p class="sub">等轴测 3D 平面 + 请求包实时流转 — 纯 CSS/SVG，零依赖</p>
    </header>

    <!-- ------------------------- Isometric stage ---------------------- -->
    <!-- perspective container (perspective lives HERE, not on the plane) -->
    <div class="scene" id="scene">

  <!--
    ============================================================================
    VANILLA JS — pointer tilt (eased, one rAF loop) + arrival pulses + replay.
    No libraries. Skipped entirely under reduced-motion / touch.
    ============================================================================
  -->
  <script>
  (function () {
    "use strict";

    var reduceMotion = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var coarsePointer = window.matchMedia &&
      window.matchMedia("(hover: none), (pointer: coarse)").matches;

    var scene = document.getElementById("scene");
    var tilt  = document.getElementById("tilt");

    /* ---- Pointer tilt --------------------------------------------------
       Nudge .tilt's rotateX/rotateZ a few degrees around the base pose.
       We ease current -> target every frame (never write target straight
       to the DOM, which would snap). Touch/reduced-motion skip this. */
    var MAX = 3;             /* deg — peak tilt on each axis          */
    var EASE = 0.08;         /* lerp factor toward target per frame   */
    var curRX = 0, curRZ = 0, tgtRX = 0, tgtRZ = 0;
    var running = false, rafId = 0;

    function loop() {
      curRX += (tgtRX - curRX) * EASE;
      curRZ += (tgtRZ - curRZ) * EASE;
      tilt.style.setProperty("--tilt-rx", curRX.toFixed(3) + "deg");
      tilt.style.setProperty("--tilt-rz", curRZ.toFixed(3) + "deg");
      /* stop the loop once it has essentially settled at target (idle) */
      if (Math.abs(tgtRX - curRX) < 0.002 && Math.abs(tgtRZ - curRZ) < 0.002) {
        curRX = tgtRX; curRZ = tgtRZ;
        tilt.style.setProperty("--tilt-rx", curRX.toFixed(3) + "deg");
        tilt.style.setProperty("--tilt-rz", curRZ.toFixed(3) + "deg");
        running = false; return;
      }
      rafId = requestAnimationFrame(loop);
    }
    function kick() { if (!running) { running = true; rafId = requestAnimationFrame(loop); } }

    if (!reduceMotion && !coarsePointer) {
      scene.addEventListener("pointermove", function (e) {
        if (e.pointerType === "touch") return;    /* ignore touch */
        var r = scene.getBoundingClientRect();
        var nx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
        var ny = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
        nx = Math.max(-1, Math.min(1, nx));
        ny = Math.max(-1, Math.min(1, ny));
        tgtRX = -ny * MAX;    /* mouse DOWN -> tip plane back           */
        tgtRZ =  nx * MAX;    /* mouse RIGHT -> spin plane a touch      */
        kick();
      });
      scene.addEventListener("pointerleave", function () {
        tgtRX = 0; tgtRZ = 0; kick();             /* glide back to rest  */
      });
      /* Pause the eased loop while the tab is hidden (saves cycles). */
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); running = false; }
        else { kick(); }
      });
    }

    /* ---- Arrival pulses ------------------------------------------------
       Flash a tile's glow when the request wave reaches it. Timings are
       derived from the packets' keyTimes * 7000ms (arrival = window end).
       We use one repeating 7s scheduler via setInterval + setTimeout so it
       stays locked to the SMIL loop. Skipped under reduced-motion. */
    if (!reduceMotion) {
      var byId = {};
      document.querySelectorAll(".tile").forEach(function (t) { byId[t.getAttribute("data-tile")] = t; });
      function pulse(t) {
        if (!t) return;
        t.classList.remove("pulse");   /* restart the animation cleanly */
        void t.offsetWidth;            /* force reflow                  */
        t.classList.add("pulse");
      }
      /* arrival ms within the 7000ms cycle (packet window END) */
      var schedule = [
        { id: "gateway", t: 0.15 }, { id: "svcA", t: 0.30 }, { id: "svcB", t: 0.30 },
        { id: "cache",   t: 0.45 }, { id: "db",   t: 0.48 }, { id: "db",   t: 0.50 },
        /* response wave landing back down the tree */
        { id: "svcA", t: 0.67 }, { id: "svcB", t: 0.83 }, { id: "gateway", t: 0.81 },
        { id: "client", t: 0.98 }
      ];
      var CYCLE = 7000;
      var timers = [];
      function runCycle() {
        schedule.forEach(function (s) {
          timers.push(setTimeout(function () { pulse(byId[s.id]); }, s.t * CYCLE));
        });
      }
      runCycle();
      setInterval(runCycle, CYCLE);
    }

    /* ---- Replay --------------------------------------------------------
       Rewind every SMIL timeline to 0 so the choreography restarts in
       sync. setCurrentTime(0) on the root <svg> is the clean way. Also
       re-arms the pulse scheduler alignment by restarting timelines. */
    var replay = document.getElementById("replay");
    if (replay) {
      replay.addEventListener("click", function () {
        var svg = document.querySelector(".paths svg");
        if (svg && typeof svg.setCurrentTime === "function") {
          try { svg.setCurrentTime(0); } catch (err) { /* no-op */ }
        }
      });
    }
  })();
  </script>
