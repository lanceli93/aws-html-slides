<!DOCTYPE html>
<!-- =====================================================================
     Native SVG Diagram — Radial Mind Map  ·  "逆向工程方法论全景"
     ---------------------------------------------------------------------
     ONE self-contained, OFFLINE, ZERO-DEPENDENCY file. No CDN, no web
     fonts, no build step, no libraries, no emoji — a hand-written radial
     SVG mind map that replaces a static drawio PNG export.

     WHY hand-written (not a drawio export): a mind map is just a center
     node + N cubic-bezier limbs + labelled capsules. Authoring it as live
     SVG (~1 file, a few KB) instead of a flat PNG buys us three things a
     raster export can never give:
       1. an ENTRANCE — the tree "blooms": center pulses in, limbs draw
          themselves outward (stroke-dashoffset), capsules pop, leaves
          cascade. All CSS keyframes, staggered by per-node --delay vars.
       2. AMBIENCE — each branch group drifts ±3px on its own slow period
          so the whole map breathes; the center glow pulses.
       3. INTERACTION — hover/click a branch capsule to spotlight its whole
          subtree (limb + capsule + leaves at full glow) and dim the rest.

     HOW THE STATIC PICTURE IS BUILT (copy-paste reference):
       * viewBox is a fixed 1400x760 design canvas; the <svg> scales to fit
         with preserveAspectRatio, so all coordinates below are hand-placed
         in that space and never need media queries.
       * Center capsule sits at (700,380). Six branches radiate at roughly
         even angles — 3 left, 3 right — for a symmetric, no-overlap layout.
       * Each limb is ONE cubic bezier M700,380 C.. from the center to the
         branch capsule. Leaf limbs are shorter beziers from the branch
         capsule to each leaf pill. Coordinates were laid out and checked
         for zero box-overlap at 1400x760 before being frozen here.
       * pathLength="1" normalizes every path so a single dasharray/offset
         of 1 -> 0 draws it, regardless of real length.

     ACCESSIBILITY / ROBUSTNESS:
       * prefers-reduced-motion  -> no bloom, no drift; the fully-bloomed
         static tree is shown immediately (opacity/scale forced to final).
       * Fits 100vh, no scrollbars. Console stays clean. file:// works.
     ===================================================================== -->
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Native SVG — Radial Mind Map · 逆向工程方法论全景</title>
<style>
  /* ============================================================
     SELF-CONTAINED, OFFLINE styles. Requested font stack first,
     with generous fallbacks so it renders anywhere.
     ============================================================ */
  :root {
    --bg:      #0a0f1c;   /* deep navy base */
    --text:    #e0e0ff;   /* node / body text */
    --cyan:    #00ffcc;
    --magenta: #ff00aa;
    --blue:    #00aaff;
    --amber:   #ffaa00;
    --violet:  #aa00ff;
    --redpink: #ff5555;
    --center:  #b9fff0;   /* center capsule accent */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100vh; height: 100dvh;   /* viewport fit, no scroll */
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Clash Display', 'Satoshi', 'Avenir Next', 'PingFang SC', sans-serif;
  }

  /* ---------------- background: starfield dots + faint grid + glow orbs ----
     All pure CSS, painted on <body> behind the SVG. The two radial-gradient
     "orbs" give the deck a soft neon wash; the layered small gradients are a
     sparse starfield; the linear grid is barely-there structure. */
  body {
    position: relative;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1.4px 1.4px at 12% 22%, rgba(224,224,255,0.55), transparent 60%),
      radial-gradient(1.2px 1.2px at 78% 14%, rgba(0,255,204,0.45), transparent 60%),
      radial-gradient(1.3px 1.3px at 63% 78%, rgba(255,0,170,0.40), transparent 60%),
      radial-gradient(1.1px 1.1px at 32% 62%, rgba(0,170,255,0.42), transparent 60%),
      radial-gradient(1.2px 1.2px at 88% 66%, rgba(224,224,255,0.35), transparent 60%),
      radial-gradient(1.1px 1.1px at 46% 30%, rgba(255,255,255,0.30), transparent 60%),
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px),
      var(--bg);
    background-size:
      auto, auto, auto, auto, auto, auto,
      44px 44px, 44px 44px, auto;
  }
  /* two soft glow orbs, biased to opposite corners, pulsing gently */
  body::before, body::after {
    content: ""; position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%; filter: blur(90px);
  }
  body::before {
    width: 46vw; height: 46vw; left: -12vw; top: -14vw;
    background: radial-gradient(circle, rgba(0,255,204,0.16), transparent 68%);
    animation: orb 13s ease-in-out infinite;
  }
  body::after {
    width: 50vw; height: 50vw; right: -14vw; bottom: -18vw;
    background: radial-gradient(circle, rgba(170,0,255,0.15), transparent 68%);
    animation: orb 17s ease-in-out infinite reverse;
  }
  @keyframes orb {
    0%,100% { transform: translate(0,0) scale(1);    opacity: 0.85; }
    50%     { transform: translate(3%, 4%) scale(1.08); opacity: 1;  }
  }

  /* ---------------- header ---------------- */
  header {
    position: relative; z-index: 2;
    text-align: center; padding: 2.6vh 6vw 0.4vh;
    flex: 0 0 auto; pointer-events: none;
  }
  .eyebrow {
    font-size: clamp(10px, 1.15vw, 14px); letter-spacing: 0.4em; font-weight: 600;
    text-transform: uppercase; color: rgba(224,224,255,0.62);
  }
  .eyebrow .tick { color: var(--cyan); }
  h1 {
    margin-top: 0.7rem;
    font-size: clamp(26px, 4.2vw, 52px); line-height: 1.05; font-weight: 800;
    letter-spacing: 0.01em;
    background: linear-gradient(100deg, #fff 0%, #b9fff0 32%, var(--magenta) 70%, var(--blue) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 3px 26px rgba(0,255,204,0.22));
  }
  .sub {
    margin-top: 0.7rem; font-size: clamp(12px, 1.5vw, 17px); font-weight: 400;
    color: rgba(224,224,255,0.68); letter-spacing: 0.02em;
  }

  /* ---------------- SVG stage ---------------- */
  .stage {
    position: relative; z-index: 1; flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    min-height: 0; padding: 0 2vw;
  }
  svg#map {
    width: 100%; max-width: 1400px; max-height: 70vh;
    height: auto; display: block; overflow: visible;
  }

  /* ============================================================
     NODE VISUALS
     ============================================================ */
  /* limbs: colored bezier strokes. --bc is set per branch group. */
  .limb, .leaf-limb {
    fill: none; stroke: var(--bc); stroke-linecap: round;
    filter: drop-shadow(0 0 5px var(--bc));
  }
  .limb      { stroke-width: 3.5; }
  .leaf-limb { stroke-width: 2;  opacity: 0.72; }

  /* branch capsule */
  .cap rect {
    fill: rgba(10,15,28,0.72); stroke: var(--bc); stroke-width: 2.5;
    filter: drop-shadow(0 0 10px var(--bc));
  }
  .cap-t {
    fill: var(--text); font-size: 19px; font-weight: 700;
    dominant-baseline: middle; text-anchor: start; letter-spacing: 0.01em;
  }
  .ic { fill: none; stroke: var(--bc); stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        filter: drop-shadow(0 0 4px var(--bc)); }

  /* leaf pill */
  .leaf rect {
    fill: rgba(10,15,28,0.55); stroke: var(--bc); stroke-width: 1.6;
    opacity: 0.92;
  }
  .leaf-t {
    fill: var(--text); font-size: 13.5px; font-weight: 500;
    dominant-baseline: middle; text-anchor: middle; opacity: 0.94;
  }

  /* center node */
  #center rect {
    /* fully opaque: the six limbs terminate underneath this capsule — any
       translucency would let them ghost through the label text */
    fill: #0d1322;
    stroke: var(--center); stroke-width: 3;
    filter: drop-shadow(0 0 20px rgba(0,255,204,0.55));
  }
  #center .halo {
    fill: rgba(0,255,204,0.10); stroke: none; filter: blur(2px);
  }
  #center text {
    fill: #fff; font-size: 30px; font-weight: 800; letter-spacing: 0.02em;
    dominant-baseline: middle; text-anchor: middle;
    filter: drop-shadow(0 0 12px rgba(0,255,204,0.6));
  }

  /* ============================================================
     BLOOM ENTRANCE  (default state = pre-bloom / hidden)
     Each element carries its own --delay via inline style var; the
     keyframes below give the spring-ish grow. When #map has .bloom the
     animations play once and settle on their end state (fill: both).
     ============================================================ */
  /* center: scale-pulse in */
  #center { transform-box: fill-box; transform-origin: center;
            opacity: 0; transform: scale(0.4); }
  #map.bloom #center { animation: centerIn 0.7s cubic-bezier(.2,1.5,.4,1) 0.05s both; }
  @keyframes centerIn {
    0%   { opacity: 0; transform: scale(0.4); }
    70%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* limbs: draw with dashoffset from tail to tip */
  .limb, .leaf-limb {
    stroke-dasharray: 1; stroke-dashoffset: 1;   /* pathLength=1 -> hidden */
  }
  #map.bloom .limb      { animation: draw 0.55s ease-out var(--ld)  both; }
  #map.bloom .leaf-limb { animation: draw 0.4s  ease-out var(--lld) both; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* branch capsules: pop with spring */
  .cap { transform-box: fill-box; transform-origin: center;
         opacity: 0; transform: scale(0.3); }
  #map.bloom .cap { animation: pop 0.5s cubic-bezier(.2,1.5,.4,1) var(--cd) both; }
  @keyframes pop {
    0%   { opacity: 0; transform: scale(0.3); }
    70%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* leaf pills: cascade in, slight rise */
  .leaf { transform-box: fill-box; transform-origin: center;
          opacity: 0; transform: scale(0.5); }
  #map.bloom .leaf { animation: leafIn 0.45s cubic-bezier(.2,1.4,.4,1) var(--fd) both; }
  @keyframes leafIn {
    0%   { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ============================================================
     AMBIENT DRIFT  — each branch group breathes on its own period.
     Applied only AFTER bloom settles (.settled) so it doesn't fight the
     entrance transforms. Center gets a slow glow pulse.
     --drift = period, --doff = negative delay to desync the phases.
     ============================================================ */
  #map.settled .branch {
    animation: drift var(--drift) ease-in-out var(--doff) infinite;
  }
  @keyframes drift {
    0%,100% { transform: translate(0px, 0px); }
    33%     { transform: translate(2px, -3px); }
    66%     { transform: translate(-2px, 2px); }
  }
  #map.settled #center .halo {
    animation: glow 4.5s ease-in-out infinite;
    transform-box: fill-box; transform-origin: center;
  }
  @keyframes glow {
    0%,100% { opacity: 0.55; transform: scale(1);    }
    50%     { opacity: 1;    transform: scale(1.14); }
  }

  /* ============================================================
     SUBTREE SPOTLIGHT  — when #map has .focus and a branch has .active,
     everything that is NOT the active branch dims. Active branch pops to
     full glow. Center stays lit. Toggled by ~25 lines of JS below.
     ============================================================ */
  #map.focus .branch          { opacity: 0.22; transition: opacity 0.28s ease; }
  #map.focus .branch.active   { opacity: 1; }
  #map.focus .branch.active .cap rect  { stroke-width: 3.2; filter: drop-shadow(0 0 16px var(--bc)); }
  #map.focus .branch.active .limb      { stroke-width: 4.2; }
  #map.focus .branch.active .leaf rect { opacity: 1; stroke-width: 2.2; }
  .branch .cap { cursor: pointer; }
  /* keep the drift transform working under focus by not touching transform */

  /* ---------------- controls + caption ---------------- */
  .caption {
    position: fixed; left: 26px; bottom: 20px; z-index: 3;
    font-size: clamp(10px, 1.1vw, 13px); letter-spacing: 0.06em;
    color: rgba(224,224,255,0.5); pointer-events: none; max-width: 60vw;
  }
  .caption b { color: rgba(224,224,255,0.78); font-weight: 600; }
  #replay {
    position: fixed; right: 26px; bottom: 20px; z-index: 3;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(10,15,28,0.6); color: var(--text);
    border: 1.5px solid rgba(0,255,204,0.55);
    font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer; backdrop-filter: blur(6px);
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
  }
  #replay:hover  { background: rgba(0,255,204,0.14); box-shadow: 0 0 18px rgba(0,255,204,0.4); }
  #replay:active { transform: scale(0.96); }
  #replay svg { width: 15px; height: 15px; stroke: var(--cyan); fill: none;
                stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ============================================================
     REDUCED MOTION  — no bloom, no drift, no orb pulse. Show the fully
     bloomed static tree instantly by forcing every animated element to
     its end state. Replay button is hidden (nothing to replay).
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
    #center            { opacity: 1; transform: scale(1); }
    .cap               { opacity: 1; transform: scale(1); }
    .leaf              { opacity: 1; transform: scale(1); }
    .limb, .leaf-limb  { stroke-dashoffset: 0; }
    #map, #map.bloom, #map.settled { }
    #map .branch       { animation: none; }
    #replay            { display: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="eyebrow">NATIVE SVG DIAGRAM<span class="tick"> // </span>RADIAL MIND MAP</div>

  <div class="stage">

    <svg id="map" viewBox="0 0 1400 760" preserveAspectRatio="xMidYMid meet"

           ================================================================= -->
  <g class="branch" data-branch="1" style="--bc:#00ffcc;--drift:11s;--doff:-2s">

  <script>
  "use strict";
  (function () {
    // =================================================================
    //  ~25 lines of glue: bloom lifecycle + subtree spotlight + replay.
    //  Everything visual is CSS; JS only toggles classes.
    // =================================================================
    var map = document.getElementById("map");
    var replay = document.getElementById("replay");
    var branches = map.querySelectorAll(".branch");
    var settleTimer = 0;

    var reduce = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // ---- play the bloom, then flip to the ambient (.settled) state ----
    function bloom() {
      clearTimeout(settleTimer);
      map.classList.remove("bloom", "settled");
      // force reflow so re-adding .bloom restarts the animations
      void map.getBoundingClientRect();
      map.classList.add("bloom");
      // after the full cascade (~2.2s) enable the breathing drift
      settleTimer = setTimeout(function () { map.classList.add("settled"); }, 2200);
    }

    // ---- spotlight the hovered/clicked subtree, dim the rest ----
    function focus(b) { map.classList.add("focus");
                        branches.forEach(function (g) { g.classList.toggle("active", g === b); }); }
    function clearFocus() { map.classList.remove("focus");
                            branches.forEach(function (g) { g.classList.remove("active"); }); }

    branches.forEach(function (g) {
      var cap = g.querySelector(".cap");
      cap.addEventListener("mouseenter", function () { focus(g); });
      cap.addEventListener("click",      function () { focus(g); });
    });
    // leaving the whole SVG clears the spotlight
    map.addEventListener("mouseleave", clearFocus);

    replay.addEventListener("click", function () { clearFocus(); bloom(); });

    // ---- boot: reduced-motion shows the static tree (CSS handles it);
    //      otherwise run the bloom once on load. ----
    if (!reduce) bloom();
  })();
  </script>
